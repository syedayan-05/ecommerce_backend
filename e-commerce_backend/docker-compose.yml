version: '3.8'

services:

  mysql-db:
    image: mysql:8
    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  ecommerce-app:
    build: .

    container_name: ecommerce-app

    ports:
      - "8080:8080"

    depends_on:
      - mysql-db

volumes:
  mysql_data: